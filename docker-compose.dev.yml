# Scratch DEV server — identical to the live broker deployment
# (docker-compose.broker.yml) but on a DIFFERENT port with its own container,
# image tag, and session state. Point the app at :8557 to test a build; rebuild
# it freely without touching the live :8556 server (so a rebuild never kills an
# in-flight turn on the real server).
#
#   SPAWNER_TOKEN=devsecret docker compose -f docker-compose.dev.yml up -d --build
#
# Reuses the SAME host broker and the SAME resident whisper servers as live.
# Its session registry is separate (~/.local/share/claude_spawner_dev) so dev
# runs can't clobber the live sessions.json; on-disk transcripts under ~/.claude
# are still discoverable read-only.
name: claude-spawner-dev

services:
  spawner-dev:
    build:
      context: ./server
      dockerfile: Dockerfile.broker
    image: spawner-server:dev
    container_name: claude-spawner-dev
    network_mode: host
    volumes:
      - ${HOME}/.local/share/claude_spawner/broker:${HOME}/.local/share/claude_spawner/broker
      - ${HOME}/git:${HOME}/git:ro
      - /data:/data:ro
      - ${HOME}/.claude:/home/app/.claude:ro
      # Separate dev state dir (create it first: mkdir -p ~/.local/share/claude_spawner_dev).
      - ${HOME}/.local/share/claude_spawner_dev:/state
    environment:
      SPAWNER_TOKEN: ${SPAWNER_TOKEN:-devsecret}
      SPAWNER_ADDR: ":8557"
      SPAWNER_ROOT: ${HOME}/git:/data
      SPAWNER_STATE: /state/sessions.json
      SPAWNER_BROKER_SOCKET: ${HOME}/.local/share/claude_spawner/broker/broker.sock
      SPAWNER_SANDBOX_IMAGE: ${SPAWNER_SANDBOX_IMAGE:-spawner-sandbox:latest}
      SPAWNER_WHISPER_URL: ${SPAWNER_WHISPER_URL:-http://localhost:8571}
      SPAWNER_WHISPER_FAST_URL: ${SPAWNER_WHISPER_FAST_URL:-http://localhost:8572}
      SPAWNER_WHISPER_MODEL_NAME: ${SPAWNER_WHISPER_MODEL_NAME:-large-v3}
    # Dev: don't auto-resurrect on reboot; bring it up by hand when testing.
    restart: "no"

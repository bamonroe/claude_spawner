# Containerized spawner in BROKER mode — the LIVE deployment.
#
# The server runs unprivileged in a Docker container and delegates ALL turn
# execution to the host-side broker (deploy/spawner-broker.service) over a
# bind-mounted Unix socket — so the container holds no host root and no
# container-runtime socket. The broker forks claude for host turns and drives
# rootless Podman for sandbox turns. Verified end to end (host + sandbox).
#
#   1. Run the broker first (systemd user service): deploy/spawner-broker.service.
#   2. Edit paths/values below for your host.
#   3. docker compose -f docker-compose.broker.yml up -d --build
#
# Host networking is used so the server binds :8556 and reaches the resident
# whisper servers on localhost, exactly like the retired native server did.

services:
  spawner:
    build:
      context: ./server
      dockerfile: Dockerfile.broker
    image: spawner-server:latest
    # Not "spawner-…": the sandbox reconcile filters containers by the
    # "spawner-sbx-" prefix, and this name must not collide with that.
    container_name: claude-spawner-server
    # Rootful Docker maps the image's uid 1000 1:1 to the host user, so it reads
    # the owner-only broker socket and host-owned mounts as you (no keep-id).
    network_mode: host
    volumes:
      # Broker socket DIRECTORY (not the socket file), same path in the container.
      # Mounting the dir means the socket can appear whenever the broker starts —
      # so container/broker boot order doesn't matter on reboot. Matches the dir
      # holding SPAWNER_BROKER_SOCKET on the broker.
      - ${HOME}/.local/share/claude_spawner/broker:${HOME}/.local/share/claude_spawner/broker
      # Spawn roots, SAME path in the container (read-only — the server only
      # browses them; the broker does the writing on the host). EDIT to yours.
      - ${HOME}/git:${HOME}/git:ro
      - /data:/data:ro
      # Session history/discovery: the server reads transcripts the broker writes.
      - ${HOME}/.claude:/home/app/.claude:ro
      # Durable session registry (read-write, on the host).
      - ${HOME}/.local/share/claude_spawner_broker:/state
    environment:
      SPAWNER_TOKEN: ${SPAWNER_TOKEN:?set SPAWNER_TOKEN}
      SPAWNER_ADDR: ":8556"
      # MUST match the broker's SPAWNER_ROOT and the same-path mounts above.
      SPAWNER_ROOT: ${HOME}/git:/data
      SPAWNER_STATE: /state/sessions.json
      SPAWNER_BROKER_SOCKET: ${HOME}/.local/share/claude_spawner/broker/broker.sock
      # Non-empty enables offering "sandbox" in the spawn dialog; the broker holds
      # the real sandbox runtime config.
      SPAWNER_SANDBOX_IMAGE: ${SPAWNER_SANDBOX_IMAGE:-spawner-sandbox:latest}
      # Resident whisper servers on the host (accurate / fast draft).
      SPAWNER_WHISPER_URL: ${SPAWNER_WHISPER_URL:-http://localhost:8571}
      SPAWNER_WHISPER_FAST_URL: ${SPAWNER_WHISPER_FAST_URL:-http://localhost:8572}
      SPAWNER_WHISPER_MODEL_NAME: ${SPAWNER_WHISPER_MODEL_NAME:-large-v3}
    restart: unless-stopped

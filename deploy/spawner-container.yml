# Containerized claude_spawner server (SSH-native). It drives the host over SSH —
# claude runs on the HOST, not in this container — so there is no host broker and the
# container needs no host root. Because the execution path is SSH, this can run IN
# PARALLEL with a bare-metal instance (pick a non-clashing port) for a safe cutover.
#
# Prereqs (see deploy/README.md):
#   - the host's sshd accepts a key-based login from the server user to itself
#     (localhost), and that host key is already in the mounted known_hosts;
#   - fill in spawner-container.env (copy spawner-container.env.example).
#
# Run:
#   UID=$(id -u) GID=$(id -g) docker compose -f deploy/spawner-container.yml up -d --build
services:
  spawner-server:
    build:
      context: ../server
    image: spawner:latest
    container_name: spawner-server
    # Host networking so localhost:22 is the host's sshd and SPAWNER_ADDR binds on the
    # host directly. Use a port that doesn't collide with any bare-metal instance.
    network_mode: host
    user: "${UID}:${GID}"
    env_file: spawner-container.env
    volumes:
      # The user's home and project roots at the SAME paths the host uses, so the
      # server browses and reads transcripts where the host writes them (claude runs
      # on the host over SSH). Writable so a "new project folder" spawn can mkdir.
      - "${HOME}:${HOME}"
      - "/data:/data"
      # Durable server state (sessions.json, hosts.json) kept out of the image.
      - "./state:/state"
    restart: unless-stopped

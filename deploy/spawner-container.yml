# Containerized claude_spawner server (SSH-native) — the one supported deployment.
# It builds the Go binary from ../server and drives the host over SSH — claude runs
# on the HOST, not in this container — so there is no host broker and the container
# needs no host root.
#
# Prereqs (see deploy/README.md):
#   - the host's sshd accepts a key-based login from the server user to itself
#     (localhost), and that host key is in the server's own known_hosts
#     (./state/known_hosts — self-contained, NOT the host's ~/.ssh/known_hosts);
#   - fill in spawner-container.env (copy spawner-container.env.example).
#
# Run (SPAWNER_UID/GID rather than UID/GID — the latter are readonly in some shells):
#   SPAWNER_UID=$(id -u) SPAWNER_GID=$(id -g) docker compose -f deploy/spawner-container.yml up -d --build
services:
  spawner-server:
    build:
      context: ../server
    image: spawner:latest
    container_name: spawner-server
    # Host networking so localhost:22 is the host's sshd and SPAWNER_ADDR binds on the
    # host directly.
    network_mode: host
    user: "${SPAWNER_UID:?set SPAWNER_UID=$(id -u)}:${SPAWNER_GID:?set SPAWNER_GID=$(id -g)}"
    env_file: spawner-container.env
    volumes:
      # The user's home and project roots at the SAME paths the host uses, so the
      # server browses and reads transcripts where the host writes them (claude runs
      # on the host over SSH). Writable so a "new project folder" spawn can mkdir.
      - "${HOME}:${HOME}"
      - "/data:/data"
      # Durable server state (sessions.json, hosts.json) kept out of the image.
      - "./state:/state"
      # So the container's uid resolves to a real user: the openssh CLIENT the restart
      # button uses (SPAWNER_RESTART_CMD → ssh to host) aborts with "No user exists for
      # uid" without a passwd entry. (Go's SSH for turns doesn't need this.)
      - "/etc/passwd:/etc/passwd:ro"
    restart: unless-stopped

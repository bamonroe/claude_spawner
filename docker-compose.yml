# The whole claude_spawner backend in one stack — launch it with a single command
# from the repo root:
#
#   docker compose up -d --build
#
# Four services:
#   spawner-server — the Go gateway. This container builds the binary from ./server
#                    and drives the HOST over SSH (unconditionally): `claude` for host
#                    turns and rootless Podman for sandbox turns both run on the host.
#   whisper        — the resident whisper.cpp transcription server on :8571 (CUDA).
#                    spawner-server points at it via SPAWNER_WHISPER_URL.
#   kokoro         — the resident Kokoro TTS server on :8880 (CUDA, shares the GPU
#                    with whisper). spawner-server points at it via SPAWNER_TTS_URL;
#                    optional — without it clients fall back to on-device speech.
#   wakeword       — the resident spawner-wakeword detector on :9060 (CPU-only). scores
#                    each hands-free clip for the bump_bump/beep_beep tokens; spawner-server
#                    points at it via SPAWNER_WAKEWORD_URL. Optional — without it detection
#                    falls back to the Whisper string-match.
#
# Prereqs FIRST (see deploy/README.md for the full first-run guide): copy
# deploy/spawner-container.env.example to deploy/spawner-container.env and fill it in
# (token, HOME, SSH user, roots) — `up` hard-fails if that env_file is missing — and set
# SPAWNER_UID/SPAWNER_GID so the server runs as you (they're in the git-ignored .env —
# copy .env.example, or prefix: SPAWNER_UID=$(id -u) SPAWNER_GID=$(id -g) docker compose ...).
# SSH keys and known_hosts need NO seeding — the server mints and trusts its own on
# first boot (you just authorize its public key afterwards; see deploy/README.md).
#
# Text-only / no GPU: `docker compose up -d --build spawner-server` runs just the
# gateway; voice needs the whisper service (and an Nvidia GPU + the container toolkit).

services:
  # The Go gateway. Host networking so localhost:22 is the host's sshd (host turns run
  # over SSH) and SPAWNER_ADDR binds on the host directly; localhost:8571 reaches the
  # whisper service's published port. No host FS is mounted for project/home access:
  # every turn, spawn-dir op, and transcript/discovery read runs on the host over SSH,
  # so the gateway never touches the host's `/data` or `$HOME` from inside the container.
  spawner-server:
    build:
      context: ./server
    image: spawner:latest
    container_name: spawner-server
    network_mode: host
    user: "${SPAWNER_UID:?set SPAWNER_UID=$(id -u) (or put it in .env)}:${SPAWNER_GID:?set SPAWNER_GID=$(id -g) (or put it in .env)}"
    env_file: deploy/spawner-container.env
    # No depends_on whisper: the gateway only dials it lazily over localhost, and tying
    # them together would drag the GPU-requiring whisper service into the documented
    # text-only `up … spawner-server` (hard-failing hosts without the nvidia toolkit).
    volumes:
      # Whisper ggml models, mounted directly (rw) so the gateway can download
      # catalogue models on demand; the whisper service mounts the same dir ro at
      # /models. The only host-path mount besides state — a deliberate shared artifact
      # dir, not a blanket assumption that the host's /data/$HOME mean anything here.
      - "${SPAWNER_WHISPER_MODELS_DIR:-/data/storage/whisper}:${SPAWNER_WHISPER_MODELS_DIR:-/data/storage/whisper}"
      # Durable server state (sessions.json, hosts.json, the server's SSH key) kept out
      # of the image.
      - "./deploy/state:/state"
      # Live wake-word training clips the in-app "add training data" flow records
      # (SPAWNER_WAKEWORD_TRAIN_DIR). Bind-mounted rw so the gateway can write clips
      # here, and the livekit-wakeword trainer picks them up from the same host dir.
      - "/data/storage/livekit-wakeword/real:/data/storage/livekit-wakeword/real"
    restart: unless-stopped

  # Resident whisper.cpp server on the Nvidia GPU via CUDA. The server + app point at
  # http://localhost:8571. Swap the model by changing `command:` — options in /models:
  # ggml-medium.en.bin, ggml-large-v3.bin, ggml-small.en.bin.
  # (A CPU-only build lives in ./whisper/Dockerfile if the GPU is ever unavailable.)
  whisper:
    build:
      context: ./whisper
      dockerfile: Dockerfile.cuda
    volumes:
      - ${SPAWNER_WHISPER_MODELS_DIR:-/data/storage/whisper}:/models:ro   # ggml model files (only mount)
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
                - compute
    command: ["-m", "/models/ggml-medium.en.bin"]
    ports:
      - "8571:8571"
    restart: unless-stopped

  # Resident wake-word / end-token detector (spawner-wakeword — the Rust sidecar wrapping
  # LiveKit's runtime). CPU-only (pure-Rust ort-tract), no GPU. The gateway points at
  # http://localhost:9060 via SPAWNER_WAKEWORD_URL and scores each hands-free clip for the
  # bump_bump (wake) / beep_beep (end) tokens instead of string-matching Whisper. NOT started
  # by the restart button (which only recreates spawner-server) — bring it up separately with
  # `docker compose up -d --build wakeword`.
  wakeword:
    build:
      context: ./wakeword/service
    image: spawner-wakeword:latest
    container_name: spawner-wakeword
    volumes:
      # The trained classifier .onnx files (livekit-wakeword trainer output), read-only at
      # /models. WAKEWORD_MODELS names the two we run and where they sit under the mount.
      - "/data/storage/livekit-wakeword/output:/models:ro"
    environment:
      WAKEWORD_MODELS: "bump_bump=/models/bump_bump/bump_bump.onnx,beep_beep=/models/beep_beep/beep_beep.onnx"
    ports:
      - "9060:9060"
    restart: unless-stopped

  # Resident Kokoro TTS server (Kokoro-FastAPI, OpenAI-compatible /v1/audio/speech),
  # sharing the same Nvidia GPU as whisper (Kokoro-82M needs ~2-3 GB VRAM at inference).
  # The gateway points at http://localhost:8880 via SPAWNER_TTS_URL. The model
  # auto-downloads (<1 GB) on first start into the named volume, so recreates don't
  # re-fetch it.
  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-gpu:latest
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
                - compute
    volumes:
      - kokoro-models:/app/api/src/models
    ports:
      - "8880:8880"
    restart: unless-stopped

volumes:
  kokoro-models:

# Supporting services for the claude_spawner server.
#
# The server itself runs BARE METAL (a single Go binary — see deploy/), not in a
# container. What stays containerized is the transcription backend: two resident
# whisper.cpp servers on the Nvidia GPU. The bare-metal server points at them via
# SPAWNER_WHISPER_URL / SPAWNER_WHISPER_FAST_URL (localhost:8571 / :8572).
#
#   docker compose up -d whisper whisper-fast   # start the transcription backend

services:
  # Resident whisper.cpp server on the Nvidia GPU via CUDA. The server + app
  # point at http://localhost:8571. Run standalone with:
  #   docker compose up -d whisper
  # Swap the model by changing `command:` — options in /models:
  # ggml-medium.en.bin, ggml-large-v3.bin, ggml-small.en.bin.
  # (A CPU-only build lives in ./whisper/Dockerfile if the GPU is ever unavailable.)
  whisper:
    build:
      context: ./whisper
      dockerfile: Dockerfile.cuda
    volumes:
      - ${HOME}/.local/share/whisper:/models:ro      # ggml model files (only mount)
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
                - compute
    command: ["-m", "/models/ggml-medium.en.bin"]
    ports:
      - "8571:8571"
    restart: unless-stopped

  # Fast draft/detection model (base.en) on :8572 — used for the live hands-free
  # draft + end-token detection, so those don't clog the accurate model on :8571.
  whisper-fast:
    build:
      context: ./whisper
      dockerfile: Dockerfile.cuda
    volumes:
      - ${HOME}/.local/share/whisper:/models:ro
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
                - compute
    command: ["-m", "/models/ggml-base.en.bin"]
    ports:
      - "8572:8571"
    restart: unless-stopped

# Supporting services for the claude_spawner server.
#
# The server itself runs in its own container (deploy/spawner-container.yml, which
# builds the Go binary and drives the host over SSH). This file holds the OTHER
# container it depends on: the transcription backend — one resident whisper.cpp
# server on the Nvidia GPU. The server points at it via SPAWNER_WHISPER_URL
# (localhost:8571).
#
#   docker compose up -d whisper   # start the transcription backend
#
# A second "fast" model on :8572 is optional (set SPAWNER_WHISPER_FAST_URL to
# re-enable it) — with hardware this quick, one model handles both the live
# hands-free draft and committed dictation, so we run a single container.

services:
  # Resident whisper.cpp server on the Nvidia GPU via CUDA. The server + app
  # point at http://localhost:8571. Run standalone with:
  #   docker compose up -d whisper
  # Swap the model by changing `command:` — options in /models:
  # ggml-medium.en.bin, ggml-large-v3.bin, ggml-small.en.bin.
  # (A CPU-only build lives in ./whisper/Dockerfile if the GPU is ever unavailable.)
  whisper:
    build:
      context: ./whisper
      dockerfile: Dockerfile.cuda
    volumes:
      - ${HOME}/.local/share/whisper:/models:ro      # ggml model files (only mount)
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
                - compute
    command: ["-m", "/models/ggml-medium.en.bin"]
    ports:
      - "8571:8571"
    restart: unless-stopped
